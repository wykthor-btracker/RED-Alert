server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # If the SPA references assets under /RED-Alert/, strip the prefix and serve from root.
  location /RED-Alert/ {
    rewrite ^/RED-Alert/(.*)$ /$1 break;
    try_files $uri $uri/ /index.html;
  }

  location = /RED-Alert {
    return 301 /;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}

